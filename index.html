<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Map</title>
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v2.1.1/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v2.1.1/mapbox-gl.css' rel='stylesheet' />
    <script type="text/javascript" src="kiosks.js"></script> 
    <script type="text/javascript" src="pageviews.js"></script> 
    <script type="text/javascript" src="convertToGeoJSON.js"></script> 
    <link href='styles.css' rel='stylesheet' />
</head>
<body>
    <div class='sidebar'>
            <div class='heading'>
                <h1>Location of Interaction</h1>
            </div>
            <div id='listings' class='listings'></div>
        </div>
    <div id="map" class="map"></div>
  
    <script>
        // This will let you use the .remove() function later on
        if (!('remove' in Element.prototype)) {
          Element.prototype.remove = function() {
            if (this.parentNode) {
                this.parentNode.removeChild(this);
            }
          };
        }
  
        mapboxgl.accessToken = 'pk.eyJ1IjoiZGlnaXRhbGFkb3BzaXhuIiwiYSI6ImNqYTJ2MWxsaTlwbTgzMnM0bm4xOHFraXYifQ.WGyCFfwet_HfOius2_c_MQ';
        /**
         * Add the map to the page
        */
        var map = new mapboxgl.Map({
          container: 'map',
          style: 'mapbox://styles/mapbox/light-v10',
          center: [-74.00168322824545, 40.75362821432799],
          zoom: 17.5,
          scrollZoom: false,
          bearing: 29,
        });
        
        let kioskLocations = convertToGeoJSON(kiosks);

        var stores = {
          "type": "FeatureCollection",
          "features": [
            {
              "type": "Feature",
              "geometry": {
                "type": "Point",
                "coordinates": [
                  -77.034084142948,
                  38.909671288923
                ]
              },
              "properties": {
                "phoneFormatted": "(202) 234-7336",
                "phone": "2022347336",
                "address": "1471 P St NW",
                "city": "Washington DC",
                "country": "United States",
                "crossStreet": "at 15th St NW",
                "postalCode": "20005",
                "state": "D.C."
              }
            }
          ]
        }

        

  
        /**
         * Wait until the map loads to make changes to the map.
        */
        map.on('load', function (e) {
          /**
           * This is where your '.addLayer()' used to be, instead
           * add only the source without styling a layer
          */
          // map.addSource("places", {
          //   "type": "geojson",
          //   "data": stores
          // });

          map.addLayer({
            "id": "locations",
            "type": "circle",
            /* Add a GeoJSON source containing place coordinates and information. */
            "source": {
              "type": "geojson",
              "data": kioskLocations
            },
            'paint': {
              "circle-color": "#00bfff",
            }
          });

          stepThroughViews(views, kioskLocations, map, mapboxgl);
          
  
          /**
           * Add all the things to the page:
           * - The location listings on the side of the page
           * - The markers onto the map
          */
        //  buildLocationList(stores);
          //addMarkers();
        });
        
      

        function stepThroughViews(views, kioskLocations, map, mapboxgl){
          let i = 0;
          setInterval(function(){
            const interactionPoint = getKioskFromName(kioskLocations, views[i]);
            addInteractionPointToList(interactionPoint);
            firePing(interactionPoint, map, mapboxgl, views[i].Pageviews);
            i++;
          }, 1000)
        }

        function getKioskFromName(kioskLocations, view){
          return kioskLocations.features.filter(kiosk => {       
            return  kiosk.id === view["Display ID"];
          })[0]
        }

        function addInteractionPointToList(interactionPoint){
          const listing = document.createElement('div');
          listing.textContent = (interactionPoint.properties.name);
          let listings = document.getElementById('listings');
          if (listings.childElementCount === 0){
            listings.appendChild(listing)
          } else {
            listings.insertBefore(listing,listings.firstElementChild);
          }
        }

        function firePing(point, map, mapboxgl, pageviews){
          createKeyFrame(pageviews)
          var circle = document.createElement('div');
          circle.className = 'circle';
          createKeyFrame(pageviews);

          // make a marker for each feature and add to the map
          new mapboxgl.Marker(circle)
          .setLngLat(point.geometry.coordinates)
          .addTo(map);
        }

        function createKeyFrame(views){
            const styleSheet = document.createElement('style'); 
            styleSheet.type = 'text/css'; 
            document.head.appendChild(styleSheet); 
            styleSheet.sheet.insertRule(`@keyframes scaleIn {
              from {
                opacity: 1;
                width: 0px;
                height: 0px;

              }
              to {
                opacity: 0;
                width: ${views/100 * 200}px;
                height: ${views/100 * 200}px;
              }
            }`, styleSheet.length)
        }


        /**
         * Add a marker to the map for every store listing.
        **/
        function addMarkers() {
          /* For each feature in the GeoJSON object above: */
          stores.features.forEach(function(marker) {
            /* Create a div element for the marker. */
            var el = document.createElement('div');
            /* Assign a unique `id` to the marker. */
            el.id = "marker-" + marker.properties.id;
            /* Assign the `marker` class to each marker for styling. */
            el.className = 'marker';
            
            /**
             * Create a marker using the div element
             * defined above and add it to the map.
            **/
            new mapboxgl.Marker(el, { offset: [0, -23] })
              .setLngLat(marker.geometry.coordinates)
              .addTo(map);
            
            /**
             * Listen to the element and when it is clicked, do three things:
             * 1. Fly to the point
             * 2. Close all other popups and display popup for clicked store
             * 3. Highlight listing in sidebar (and remove highlight for all other listings)
            **/
            el.addEventListener('click', function(e){
              /* Fly to the point */
              flyToStore(marker);
              /* Close all other popups and display popup for clicked store */
              createPopUp(marker);
              /* Highlight listing in sidebar */
              var activeItem = document.getElementsByClassName('active');
              e.stopPropagation();
              if (activeItem[0]) {
                activeItem[0].classList.remove('active');
              }
              var listing = document.getElementById('listing-' + marker.properties.id);
              listing.classList.add('active');
            });
          });
        }
  
        /**
         * Add a listing for each store to the sidebar.
        **/
        function buildLocationList(data) {
          data.features.forEach(function(store, i){
            /**
             * Create a shortcut for `store.properties`,
             * which will be used several times below.
            **/
            var prop = store.properties;
  
            /* Add a new listing section to the sidebar. */
            var listings = document.getElementById('listings');
            var listing = listings.appendChild(document.createElement('div'));
            /* Assign a unique `id` to the listing. */
            listing.id = "listing-" + prop.id;
            /* Assign the `item` class to each listing for styling. */
            listing.className = 'item';
  
            /* Add the link to the individual listing created above. */
            var link = listing.appendChild(document.createElement('a'));
            link.href = '#';
            link.className = 'title';
            link.id = "link-" + prop.id;
            link.innerHTML = prop.address;
  
            /* Add details to the individual listing. */
            var details = listing.appendChild(document.createElement('div'));
            details.innerHTML = prop.city;
            if (prop.phone) {
              details.innerHTML += ' · ' + prop.phoneFormatted;
            }

          });
        }
  
        /**
         * Use Mapbox GL JS's `flyTo` to move the camera smoothly
         * a given center point.
        **/
        function flyToStore(currentFeature) {
          map.flyTo({
            center: currentFeature.geometry.coordinates,
            zoom: 15
          });
        }
  
      </script>
</body>
</html>
